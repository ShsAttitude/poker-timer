<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0a0505">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Blind Timer">
    <meta name="description" content="Professional Poker Tournament Blind Timer · 专业扑克锦标赛盲注计时器">
    <title>Poker Blind Timer</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --felt-deep: #0a0505;
            --felt: #110808;
            --felt-light: #180a0a;
            --gold: #d4af37;
            --gold-light: #f3e5ab;
            --gold-pale: #f9f6e6;
            --gold-dark: #aa8529;
            --gold-dim: #6b531c;
            --crimson: #5a1515;
            --crimson-bright: #8b2222;
            --card-bg: rgba(20, 12, 12, 0.75);
            --glass-border: rgba(212, 175, 55, 0.15);
            --cream: #f4ecd8;
            --cream-dim: #c5bca8;
            --cream-muted: #8a8270;
            --radius-sm: 8px;
            --radius: 12px;
            --radius-lg: 20px;
            --radius-xl: 30px;
            --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
            --font-mono: 'Segoe UI', system-ui, -apple-system, sans-serif;
            --font-display: Georgia, 'Times New Roman', serif;
            --side-col-width: 320px;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        html {
            height: 100%;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: var(--font);
            background-color: var(--felt-deep);
            background-image:
                radial-gradient(ellipse at 50% 20%, rgba(139, 34, 34, 0.15) 0%, transparent 70%),
                radial-gradient(ellipse at 50% 80%, rgba(212, 175, 55, 0.05) 0%, transparent 60%);
            color: var(--cream);
            min-height: 100%;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            -webkit-font-smoothing: antialiased;
            overscroll-behavior: none;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 24px;
            border-bottom: 1px solid rgba(212, 175, 55, 0.08);
            background: linear-gradient(180deg, rgba(10, 5, 5, 0.9) 0%, rgba(10, 5, 5, 0) 100%);
            position: relative;
            z-index: 100;
            flex-shrink: 0;
        }
        .header-brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .header-logo {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--gold-dark), var(--gold), var(--gold-light));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            color: #000;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.25);
        }
        .header-title {
            font-family: var(--font-display);
            font-size: 1.3rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            color: var(--gold);
            text-transform: uppercase;
        }
        .header-actions {
            display: flex;
            gap: 12px;
        }
        .icon-btn {
            width: 44px;
            height: 44px;
            border-radius: var(--radius-sm);
            border: 1px solid rgba(212, 175, 55, 0.2);
            background: rgba(20, 30, 20, 0.3);
            backdrop-filter: blur(10px);
            color: var(--cream-dim);
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }
        .icon-btn:hover {
            background: rgba(212, 175, 55, 0.1);
            border-color: var(--gold);
            color: var(--gold-light);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.2);
        }
        .icon-btn:active {
            transform: scale(0.92);
        }

        .main {
            flex: 1;
            display: grid;
            grid-template-columns: var(--side-col-width) 1fr var(--side-col-width);
            grid-template-rows: 1fr;
            grid-template-areas: "left center right";
            gap: 0;
            padding: 12px 20px;
            max-width: 1500px;
            width: 100%;
            margin: 0 auto;
            align-items: stretch;
            min-height: 0;
        }

        .side-left {
            grid-area: left;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px 8px;
            z-index: 2;
            min-width: 0;
        }
        .side-left-img {
            width: 100%;
            max-width: 100%;
            height: auto;
            max-height: 100%;
            object-fit: contain;
            border-radius: var(--radius-lg);
            border: 1px solid var(--glass-border);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }
        .side-left-placeholder {
            width: 100%;
            aspect-ratio: 1 / 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--card-bg);
            border: 1px dashed var(--glass-border);
            border-radius: var(--radius-lg);
            color: var(--cream-muted);
            font-size: 0.8rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            text-align: center;
            opacity: 0.6;
        }
        .side-right {
            grid-area: right;
            display: flex;
            flex-direction: column;
            align-items: stretch;
            justify-content: center;
            gap: 16px;
            padding: 10px 8px;
            z-index: 2;
        }
        .center-col {
            grid-area: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 14px;
            padding: 8px 16px;
            min-width: 0;
            z-index: 1;
        }

        .side-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            padding: 18px 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            text-align: center;
            width: 100%;
            transition: all 0.3s ease;
        }
        .side-card.highlight {
            border-color: rgba(212, 175, 55, 0.45);
            background: linear-gradient(180deg, rgba(212, 175, 55, 0.1), rgba(12, 20, 12, 0.55));
            box-shadow: 0 0 35px rgba(212, 175, 55, 0.12), 0 10px 40px rgba(0, 0, 0, 0.5);
        }
        .side-card .stat-label {
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--cream-dim);
            font-weight: 700;
            white-space: nowrap;
            text-shadow: 0 1px 4px rgba(0,0,0,0.6);
        }
        .side-card .stat-value {
            font-family: var(--font-mono);
            font-size: 3rem;
            font-weight: 700;
            color: #fff;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
            text-align: center;
            word-break: break-all;
        }
        .side-card .stat-value.gold {
            color: var(--gold-light);
            font-size: 3rem;
            font-weight: 700;
        }
        .side-card .stat-value.next-blinds {
            font-size: 2.8rem;
            line-height: 1.2;
            letter-spacing: 0.03em;
        }
        .side-card .stat-input {
            background: transparent;
            border: none;
            border-bottom: 2px solid rgba(212, 175, 55, 0.3);
            color: #fff;
            font-family: var(--font-mono);
            font-size: 2.8rem;
            font-weight: 700;
            text-align: center;
            width: 100%;
            outline: none;
            transition: border 0.3s;
            padding: 4px 0;
        }
        .side-card .stat-input:focus {
            border-color: var(--gold);
        }
        .side-card .stat-input[type="number"] {
            -moz-appearance: textfield;
        }
        .side-card .stat-input[type="number"]::-webkit-inner-spin-button,
        .side-card .stat-input[type="number"]::-webkit-outer-spin-button {
            opacity: 0;
            display: none;
        }

        .level-chip {
            display: inline-flex;
            align-items: center;
            padding: 6px 24px;
            border-radius: 30px;
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            border: 1px solid rgba(212, 175, 55, 0.4);
            background: rgba(212, 175, 55, 0.05);
            color: var(--gold-light);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            white-space: nowrap;
        }
        .level-chip.break {
            border-color: rgba(180, 140, 80, 0.4);
            color: var(--gold-pale);
        }

        .timer-display-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 2px 0;
        }
        .timer-time {
            font-family: var(--font-mono);
            font-size: clamp(6rem, 16vw, 12rem);
            font-weight: 700;
            letter-spacing: 0.02em;
            color: #ffffff;
            line-height: 0.85;
            text-shadow: 0 0 80px rgba(212, 175, 55, 0.25), 0 0 20px rgba(255, 255, 255, 0.1);
            white-space: nowrap;
        }
        .timer-time.warning {
            color: #ff5555;
            text-shadow: 0 0 80px rgba(255, 85, 85, 0.4);
            animation: timePulse 1s ease-in-out infinite;
        }
        @keyframes timePulse {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.6;
            }
        }

        .timer-cur-blinds {
            display: flex;
            align-items: baseline;
            gap: 18px;
            font-family: var(--font-mono);
            margin-top: 10px;
        }
        .tcur-sb,
        .tcur-bb {
            font-size: clamp(2rem, 5vw, 4rem);
            font-weight: 700;
            color: var(--gold);
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.8);
        }
        .tcur-div {
            font-size: clamp(2rem, 5vw, 4.5rem);
            color: rgba(255, 255, 255, 0.15);
            font-weight: 400;
        }
        .timer-cur-ante {
            font-size: clamp(2rem, 5vw, 3rem);
            color: var(--cream-dim);
            font-weight: 600;
            letter-spacing: 0.1em;
            margin-top: 4px;
            text-transform: uppercase;
        }
        .timer-next-level {
            font-size: clamp(2rem, 5vw, 3rem);
            color: var(--gold-light);
            font-weight: 600;
            letter-spacing: 0.06em;
            margin-top: 4px;
            opacity: 1;
        }

        .interaction-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            width: 100%;
            max-width: 560px;
        }
        .controls {
            display: flex;
            gap: 10px;
            align-items: stretch;
            justify-content: center;
            width: 100%;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 14px 18px;
            border-radius: var(--radius-lg);
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            border: 1px solid transparent;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            white-space: nowrap;
        }
        .btn:active {
            transform: scale(0.95);
        }
        .btn-nav {
            background: rgba(212, 175, 55, 0.05);
            border: 1px solid rgba(212, 175, 55, 0.3);
            color: var(--gold);
            flex: 1;
        }
        .btn-nav:hover {
            background: rgba(212, 175, 55, 0.15);
            border-color: var(--gold);
            color: #fff;
        }
        .btn-play {
            background: linear-gradient(135deg, #8b2222, #aa3333);
            border-color: #cc4444;
            color: #fff;
            font-size: 1.15rem;
            flex: 1.5;
            box-shadow: 0 8px 30px rgba(139, 34, 34, 0.4);
        }
        .btn-play:hover {
            background: linear-gradient(135deg, #9b2828, #bb3a3a);
            box-shadow: 0 8px 40px rgba(139, 34, 34, 0.6);
        }
        .btn-play.paused-state {
            background: rgba(25, 35, 25, 0.6);
            border-color: rgba(212, 175, 55, 0.4);
            color: var(--cream);
            box-shadow: none;
        }
        .seek-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
        }
        .seek-time {
            font-family: var(--font-mono);
            font-size: 1.1rem;
            color: var(--cream-muted);
            min-width: 44px;
            text-align: center;
        }
        .seek-slider {
            -webkit-appearance: none;
            appearance: none;
            flex: 1;
            height: 8px;
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.05);
            outline: none;
            cursor: pointer;
        }
        .seek-slider::-webkit-slider-runnable-track {
            background: linear-gradient(90deg, var(--gold) 0%, rgba(212, 175, 55, 0.2) 100%);
            height: 8px;
            border-radius: 4px;
        }
        .seek-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            margin-top: -10px;
            background: #fff;
            border: 3px solid var(--gold);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.6);
            cursor: pointer;
            transition: transform 0.2s;
        }
        .seek-slider::-webkit-slider-thumb:active {
            transform: scale(1.2);
        }

        .timeline {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            justify-content: center;
            padding: 6px 0;
            max-width: 700px;
        }
        .timeline-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.4s ease;
            cursor: pointer;
            flex-shrink: 0;
        }
        .timeline-dot.done {
            background: var(--crimson);
            border-color: var(--crimson-bright);
            box-shadow: 0 0 10px rgba(139, 34, 34, 0.5);
        }
        .timeline-dot.now {
            background: var(--gold);
            border-color: #fff;
            transform: scale(1.6);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.8);
        }
        .timeline-dot.break-dot {
            border-radius: 3px;
        }
        .timeline-dot.break-dot.done {
            background: var(--gold-dim);
            border-color: var(--gold);
        }

        .settings-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            z-index: 200;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .settings-overlay.open {
            opacity: 1;
            pointer-events: auto;
        }
        .settings-panel {
            background: var(--felt);
            border: 1px solid var(--glass-border);
            border-bottom: none;
            border-radius: var(--radius-xl) var(--radius-xl) 0 0;
            width: 100%;
            max-width: 800px;
            max-height: 85dvh;
            overflow-y: auto;
            padding: 10px 30px 40px;
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .settings-overlay.open .settings-panel {
            transform: translateY(0);
        }
        .settings-handle {
            width: 40px;
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            margin: 10px auto;
        }
        .settings-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 15px;
        }
        .settings-head h2 {
            font-size: 1.4rem;
            color: var(--gold);
            font-weight: 600;
            letter-spacing: 0.1em;
        }
        .settings-block {
            background: rgba(0, 0, 0, 0.3);
            border-radius: var(--radius-lg);
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }
        .settings-block h3 {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--cream-muted);
            margin-bottom: 15px;
        }
        .img-upload-row {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        .img-upload-btn {
            background: transparent;
            border: 1px solid rgba(212, 175, 55, 0.4);
            color: var(--cream);
            padding: 10px 20px;
            border-radius: var(--radius);
            cursor: pointer;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            white-space: nowrap;
        }
        .img-upload-btn:hover {
            background: rgba(212, 175, 55, 0.1);
            border-color: var(--gold);
        }
        .img-upload-preview {
            width: 60px;
            height: 60px;
            border-radius: var(--radius-sm);
            object-fit: cover;
            border: 1px solid var(--glass-border);
            background: rgba(0, 0, 0, 0.3);
        }
        .img-upload-name {
            font-size: 0.8rem;
            color: var(--cream-dim);
            max-width: 160px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .img-clear-btn {
            background: transparent;
            border: 1px solid rgba(255, 85, 85, 0.4);
            color: #ff5555;
            padding: 4px 12px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 0.75rem;
            transition: all 0.3s ease;
        }
        .img-clear-btn:hover {
            background: rgba(255, 85, 85, 0.1);
        }

        .level-edit-row {
            display: grid;
            grid-template-columns: 32px 70px 70px 70px 55px 60px 32px;
            gap: 8px;
            align-items: center;
            margin-bottom: 8px;
        }
        .level-edit-row.head {
            color: var(--gold-dim);
            font-size: 0.75rem;
            text-transform: uppercase;
            margin-bottom: 5px;
        }
        .level-edit-row .lvl-num {
            font-weight: bold;
            color: var(--cream-dim);
            text-align: center;
        }
        .level-edit-row input {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 6px;
            color: #fff;
            font-family: var(--font-mono);
            font-size: 0.9rem;
            padding: 6px 4px;
            text-align: center;
            min-width: 0;
        }
        .level-edit-row input:focus {
            border-color: var(--gold);
        }
        .level-edit-row .brk-tgl {
            cursor: pointer;
            padding: 6px;
            border-radius: 6px;
            background: rgba(0, 0, 0, 0.5);
            color: var(--cream-muted);
            font-size: 0.75rem;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            user-select: none;
        }
        .level-edit-row .brk-tgl.on {
            background: rgba(212, 175, 55, 0.15);
            color: var(--gold);
            border-color: var(--gold);
        }
        .row-del {
            background: rgba(255, 50, 50, 0.1);
            border: 1px solid rgba(255, 50, 50, 0.3);
            color: #ff5555;
            border-radius: 6px;
            cursor: pointer;
            height: 100%;
            font-size: 0.9rem;
            padding: 6px;
        }

        .settings-actions {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-top: 10px;
        }
        .btn-save {
            background: var(--gold);
            color: #000;
            font-weight: bold;
            font-size: 1.1rem;
            padding: 15px;
            border-radius: var(--radius);
            flex: 1;
            text-align: center;
            cursor: pointer;
            border: none;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }
        .btn-preset {
            background: transparent;
            border: 1px solid rgba(212, 175, 55, 0.4);
            color: var(--cream);
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        .btn-preset:hover {
            background: rgba(212, 175, 55, 0.1);
            border-color: var(--gold);
        }
        .btn-ghost-sm {
            background: transparent;
            color: var(--cream-muted);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 15px;
            border-radius: var(--radius);
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-ghost-sm:hover {
            border-color: rgba(255, 255, 255, 0.5);
            color: #fff;
        }

        .toast {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(-120px);
            background: rgba(20, 30, 20, 0.95);
            border: 1px solid var(--gold);
            border-radius: 30px;
            padding: 15px 30px;
            font-size: 1.1rem;
            font-weight: 600;
            color: #fff;
            z-index: 1000;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            pointer-events: none;
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        @media (max-width: 1100px) {
            :root {
                --side-col-width: 240px;
            }
            .side-card .stat-value {
                font-size: 2rem;
            }
            .side-card .stat-value.gold {
                font-size: 2.2rem;
            }
            .side-card .stat-value.next-blinds {
                font-size: 2rem;
            }
            .side-card .stat-input {
                font-size: 1.8rem;
            }
            .side-card .stat-label {
                font-size: 0.85rem;
            }

    <div class="toast" id="toast"></div>

    <script>
        const PRESETS = {
            standard: {
                name: '标准锦标赛',
                levels: [
                    { sb: 100, bb: 200, ante: 200, dur: 15, brk: false },
                    { sb: 200, bb: 300, ante: 300, dur: 15, brk: false },

                    { sb: 500, bb: 1000, ante: 1000, dur: 15, brk: true },
                    { sb: 600, bb: 1200, ante: 1200, dur: 15, brk: false },
                    { sb: 800, bb: 1600, ante: 1600, dur: 15, brk: false },
                    { sb: 1000, bb: 2000, ante: 2000, dur: 15, brk: false },
                    { sb: 1500, bb: 3000, ante: 3000, dur: 15, brk: false },
                    { sb: 2000, bb: 4000, ante: 4000, dur: 15, brk: false },
                    { sb: 3000, bb: 6000, ante: 6000, dur: 15, brk: false },
                ]
            },
            turbo: {
                name: '快速 Turbo',
                levels: [
                    { sb: 100, bb: 200, ante: 200, dur: 8, brk: false },
                    { sb: 200, bb: 400, ante: 400, dur: 8, brk: false },
                    { sb: 300, bb: 600, ante: 600, dur: 8, brk: false },
                    { sb: 500, bb: 1000, ante: 1000, dur: 8, brk: false },
                    { sb: 800, bb: 1600, ante: 1600, dur: 8, brk: false },
                    { sb: 1200, bb: 2400, ante: 2400, dur: 8, brk: true },
                    { sb: 2000, bb: 4000, ante: 4000, dur: 8, brk: false },
                    { sb: 3000, bb: 6000, ante: 6000, dur: 8, brk: false },
                    { sb: 5000, bb: 10000, ante: 10000, dur: 8, brk: false },
                    { sb: 8000, bb: 16000, ante: 16000, dur: 8, brk: false },
                ]
            },
            deep: {
                name: '深筹 Deep',
                levels: [
                    { sb: 50, bb: 100, ante: 100, dur: 20, brk: false },
                    { sb: 100, bb: 200, ante: 200, dur: 20, brk: false },
                    { sb: 150, bb: 300, ante: 300, dur: 20, brk: false },
                    { sb: 200, bb: 400, ante: 400, dur: 20, brk: false },
                    { sb: 300, bb: 600, ante: 600, dur: 20, brk: false },
                    { sb: 400, bb: 800, ante: 800, dur: 20, brk: true },
                    { sb: 500, bb: 1000, ante: 1000, dur: 20, brk: false },
                    { sb: 600, bb: 1200, ante: 1200, dur: 20, brk: false },
                    { sb: 800, bb: 1600, ante: 1600, dur: 20, brk: false },
                    { sb: 1000, bb: 2000, ante: 2000, dur: 20, brk: false },
                    { sb: 1200, bb: 2400, ante: 2400, dur: 20, brk: false },
                    { sb: 1500, bb: 3000, ante: 3000, dur: 20, brk: false },
                    { sb: 2000, bb: 4000, ante: 4000, dur: 20, brk: true },
                    { sb: 2500, bb: 5000, ante: 5000, dur: 20, brk: false },
                    { sb: 3000, bb: 6000, ante: 6000, dur: 20, brk: false },
                    { sb: 4000, bb: 8000, ante: 8000, dur: 20, brk: false },
                ]
            },
            sitngo: {
                name: 'SNG 9人',
                levels: [
                    { sb: 100, bb: 200, ante: 0, dur: 10, brk: false },
                    { sb: 150, bb: 300, ante: 300, dur: 10, brk: false },
                    { sb: 200, bb: 400, ante: 400, dur: 10, brk: false },
                    { sb: 300, bb: 600, ante: 600, dur: 10, brk: false },
                    { sb: 400, bb: 800, ante: 800, dur: 10, brk: false },
                    { sb: 600, bb: 1200, ante: 1200, dur: 10, brk: true },
                    { sb: 800, bb: 1600, ante: 1600, dur: 10, brk: false },
                    { sb: 1000, bb: 2000, ante: 2000, dur: 10, brk: false },
                    { sb: 1500, bb: 3000, ante: 3000, dur: 10, brk: false },
                    { sb: 2000, bb: 4000, ante: 4000, dur: 10, brk: false },
                    { sb: 3000, bb: 6000, ante: 6000, dur: 10, brk: false },
                ]
            }
        };

        const DEFAULT_STATE = {
            levels: [
                { smallBlind: 100, bigBlind: 200, ante: 200, durationMinutes: 15, isBreak: false },
                { smallBlind: 200, bigBlind: 300, ante: 300, durationMinutes: 15, isBreak: false },
                { smallBlind: 200, bigBlind: 400, ante: 400, durationMinutes: 15, isBreak: false },
                { smallBlind: 300, bigBlind: 500, ante: 500, durationMinutes: 15, isBreak: false },
                { smallBlind: 400, bigBlind: 800, ante: 800, durationMinutes: 15, isBreak: false },
                { smallBlind: 500, bigBlind: 1000, ante: 1000, durationMinutes: 15, isBreak: true },
                { smallBlind: 600, bigBlind: 1200, ante: 1200, durationMinutes: 15, isBreak: false },
                { smallBlind: 800, bigBlind: 1600, ante: 1600, durationMinutes: 15, isBreak: false },
                { smallBlind: 1000, bigBlind: 2000, ante: 2000, durationMinutes: 15, isBreak: false },
                { smallBlind: 1500, bigBlind: 3000, ante: 3000, durationMinutes: 15, isBreak: false },
                { smallBlind: 2000, bigBlind: 4000, ante: 4000, durationMinutes: 15, isBreak: false },
                { smallBlind: 3000, bigBlind: 6000, ante: 6000, durationMinutes: 15, isBreak: false },
            ],
            currentLevelIndex: 0,
            remainingSeconds: 900,
            isRunning: false,
            playerCount: 10,
            totalChips: 200000
        };

        let state = JSON.parse(JSON.stringify(DEFAULT_STATE));
        let timerInterval = null;
        let wakeLock = null;
        let soundEnabled = true;

        function loadState() {
            try {
                const saved = localStorage.getItem('poker_blind_timer_state_v4');
                if (saved) {
                    const parsed = JSON.parse(saved);
                    state = { ...JSON.parse(JSON.stringify(DEFAULT_STATE)), ...parsed };
                    if (!state.levels || !Array.isArray(state.levels) || state.levels.length === 0) {
                        state.levels = JSON.parse(JSON.stringify(DEFAULT_STATE.levels));
                    }
                    if (state.currentLevelIndex >= state.levels.length) {
                        state.currentLevelIndex = 0;
                        state.remainingSeconds = state.levels[0].durationMinutes * 60;
                    }
                    if (typeof state.remainingSeconds !== 'number' || state.remainingSeconds < 0) {
                        state.remainingSeconds = (state.levels[state.currentLevelIndex]?.durationMinutes ||
                            15) * 60;
                    }
                    state.isRunning = false;
                }
            } catch (e) {
                console.warn('Failed to load state:', e);
                state = JSON.parse(JSON.stringify(DEFAULT_STATE));
            }
        }

        function saveState() {
            try {
                localStorage.setItem('poker_blind_timer_state_v4', JSON.stringify(state));
            } catch (e) {
                console.warn('Failed to save state:', e);
                showToast('⚠ SAVE FAILED');
            }
        }

        function loadLogoImage() {
            try {
                const imgData = localStorage.getItem('poker_logo_image');
                const img = document.getElementById('sideLeftImg');
                const placeholder = document.getElementById('sideLeftPlaceholder');
                if (imgData && img) {
                    img.src = imgData;
                    img.style.display = '';
                    if (placeholder) placeholder.style.display = 'none';
                } else {
                    if (img) img.style.display = 'none';
                    if (placeholder) placeholder.style.display = '';
                }
            } catch (e) {}
        }

        function updateLogoPreview() {
            const imgData = localStorage.getItem('poker_logo_image');
            const preview = document.getElementById('imgPreview');
            const nameEl = document.getElementById('imgName');
            const clearBtn = document.getElementById('btnClearImg');
            if (imgData && preview) {
                preview.src = imgData;
                preview.style.display = '';
                if (nameEl) { nameEl.textContent = 'Logo set'; nameEl.style.display = ''; }
                if (clearBtn) clearBtn.style.display = '';
            } else {
                if (preview) preview.style.display = 'none';
                if (nameEl) nameEl.style.display = 'none';
                if (clearBtn) clearBtn.style.display = 'none';
            }
        }

        let audioCtx = null;
        let klaxonFiredForLevel = false;

        function getAudioCtx() {
            if (!audioCtx) {
                audioCtx = new(window.AudioContext || window.webkitAudioContext)();
            }
            return audioCtx;
        }

        function playBeep(freq, duration, type = 'square', vol = 0.08) {
            if (!soundEnabled) return;
            try {
                const ctx = getAudioCtx();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, ctx.currentTime);
                gain.gain.setValueAtTime(vol, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start(ctx.currentTime);
                osc.stop(ctx.currentTime + duration);
            } catch (e) {}
        }

        function playLevelChangeSound() {
            playBeep(880, 0.15, 'square', 0.1);
            setTimeout(() => playBeep(1100, 0.3, 'square', 0.1), 150);
        }

        function playBreakStartSound() {
            playBeep(660, 0.2, 'sine', 0.08);
            setTimeout(() => playBeep(880, 0.4, 'sine', 0.08), 200);
        }

        function playWarningSound() {
            playBeep(440, 0.1, 'sine', 0.06);
        }

        function playKlaxon() {
            if (!soundEnabled) return;
            try {
                const ctx = getAudioCtx();
                const now = ctx.currentTime;
                // Dual-tone klaxon — like a sci-fi base alarm
                const tones = [800, 600];
                tones.forEach((freq, i) => {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(freq, now + i * 0.08);
                    osc.frequency.linearRampToValueAtTime(freq * 0.8, now + i * 0.08 + 0.2);
                    osc.frequency.linearRampToValueAtTime(freq, now + i * 0.08 + 0.35);
                    gain.gain.setValueAtTime(0.07, now + i * 0.08);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.08 + 0.4);
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.start(now + i * 0.08);
                    osc.stop(now + i * 0.08 + 0.45);
                });
            } catch (e) {}
        }

        function showToast(msg) {
            const el = document.getElementById('toast');
            el.textContent = msg;
            el.classList.add('show');
            clearTimeout(el._timeout);
            el._timeout = setTimeout(() => el.classList.remove('show'), 2500);
        }

        function formatTime(seconds) {
            const m = Math.floor(seconds / 60);
            const s = seconds % 60;
            return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
        }

        function formatChips(n) {
            if (n >= 1000000) return (n / 1000000).toFixed(n % 1000000 === 0 ? 0 : 1) + 'M';
            if (n >= 1000) return (n / 1000).toFixed(n % 1000 === 0 ? 0 : 1) + 'k';
            return n.toLocaleString('en-US');
        }

        function startTimer() {
            if (state.isRunning) return;
            if (state.currentLevelIndex >= state.levels.length) return;
            state.isRunning = true;
            klaxonFiredForLevel = false;
            saveState();
            timerInterval = setInterval(tick, 1000);
            requestWakeLock();
            updatePlayButton();
            updateSeekBar();
        }

        function pauseTimer() {
            state.isRunning = false;
            saveState();
            clearInterval(timerInterval);
            timerInterval = null;
            releaseWakeLock();
            updatePlayButton();
        }

        function toggleTimer() {
            if (state.isRunning) { pauseTimer(); } else {
                if (state.currentLevelIndex >= state.levels.length) {
                    state.currentLevelIndex = 0;
                    state.remainingSeconds = state.levels[0].durationMinutes * 60;
                    saveState();
                    renderAll();
                }
                startTimer();
            }
        }

        function tick() {
            if (state.remainingSeconds > 0) {
                state.remainingSeconds--;
                if (state.remainingSeconds <= 5 && state.remainingSeconds > 0) { playWarningSound(); }
                updateTimerDisplay();
                updateSeekBar();
            } else { advanceLevel(); }
        }

        function advanceLevel() {
            pauseTimer();
            if (state.currentLevelIndex < state.levels.length - 1) {
                state.currentLevelIndex++;
                klaxonFiredForLevel = false;
                state.remainingSeconds = state.levels[state.currentLevelIndex].durationMinutes * 60;
                const lvl = state.levels[state.currentLevelIndex];
                if (lvl.isBreak) { playBreakStartSound();
                    showToast('BREAK TIME'); } else { playLevelChangeSound();
                    showToast('LEVEL UP'); }
                saveState();
                renderAll();
            } else {
                showToast('TOURNAMENT ENDED');
                state.currentLevelIndex = state.levels.length;
                saveState();
                renderAll();
                updatePlayButton();
            }
        }

        function skipToNextLevel() {
            if (state.currentLevelIndex >= state.levels.length) return;
            state.remainingSeconds = 0;
            advanceLevel();
        }

        function goToPrevLevel() {
            if (state.currentLevelIndex <= 0) return;
            pauseTimer();
            state.currentLevelIndex--;
            state.remainingSeconds = state.levels[state.currentLevelIndex].durationMinutes * 60;
            saveState();
            renderAll();
        }

        function updateTimerDisplay() {
            const d = document.getElementById('timerDisplay');
            const r = Math.max(0, state.remainingSeconds);
            d.textContent = formatTime(r);
            d.classList.toggle('warning', r <= 5 && r > 0 && state.isRunning);
        }

        function updateSeekBar() {
            const lvl = state.levels[state.currentLevelIndex];
            if (!lvl || state.currentLevelIndex >= state.levels.length) return;
            const total = lvl.durationMinutes * 60;
            const remaining = Math.max(0, state.remainingSeconds);
            const elapsed = total - remaining;
            const slider = document.getElementById('seekSlider');
            slider.max = total;
            slider.value = elapsed;
            document.getElementById('seekElapsed').textContent = formatTime(elapsed);
            document.getElementById('seekTotal').textContent = formatTime(total);
        }

        function updatePlayButton() {
            const icon = document.getElementById('btnPlayIcon');
            const text = document.getElementById('btnPlayText');
            const btn = document.getElementById('btnPlay');
            if (state.currentLevelIndex >= state.levels.length) {
                icon.textContent = '🏆';
                text.textContent = 'END';
                btn.classList.add('paused-state');
                btn.disabled = true;
            } else if (state.isRunning) {
                icon.textContent = '⏸';
                text.textContent = 'PAUSE';
                btn.classList.remove('paused-state');
                btn.disabled = false;
            } else {
                icon.textContent = '▶';
                text.textContent = 'START';
                btn.classList.add('paused-state');
                btn.disabled = false;
            }
        }

        function renderLevelBadge() {
            const badge = document.getElementById('levelBadge');
            if (state.currentLevelIndex >= state.levels.length) {
                badge.textContent = 'TOURNAMENT COMPLETE';
                badge.classList.add('break');
                return;
            }
            const lvl = state.levels[state.currentLevelIndex];
            if (lvl.isBreak) {
                badge.textContent = 'BREAK TIME (' + (state.currentLevelIndex + 1) + '/' + state.levels.length +
                    ')';
                badge.classList.add('break');
            } else {
                badge.textContent = 'LEVEL ' + (state.currentLevelIndex + 1) + ' / ' + state.levels.length;
                badge.classList.remove('break');
            }
        }

        function getNextBlindsText() {
            const ni = state.currentLevelIndex + 1;
            if (ni < state.levels.length) {
                const nlvl = state.levels[ni];
                if (nlvl.isBreak) {
                    return 'BREAK';
                } else {
                    return formatChips(nlvl.smallBlind) + ' / ' + formatChips(nlvl.bigBlind);
                }
            }
            return 'NONE';
        }

        function renderBlindCards() {
            const divEl = document.getElementById('timerDiv');
            const sbEl = document.getElementById('timerSB');
            const bbEl = document.getElementById('timerBB');
            const anteEl = document.getElementById('timerAnte');
            const nextLevelEl = document.getElementById('timerNextLevel');

            if (state.currentLevelIndex < state.levels.length) {
                const lvl = state.levels[state.currentLevelIndex];
                if (lvl.isBreak) {
                    sbEl.textContent = '';
                    bbEl.textContent = 'BREAK';
                    anteEl.textContent = '';
                    divEl.style.display = 'none';
                } else {
                    sbEl.textContent = formatChips(lvl.smallBlind);
                    bbEl.textContent = formatChips(lvl.bigBlind);
                    anteEl.textContent = lvl.ante > 0 ? 'ANTE ' + formatChips(lvl.ante) : '';
                    divEl.style.display = 'inline';
                }
            } else {
                sbEl.textContent = '';
                bbEl.textContent = 'END';
                anteEl.textContent = '';
                divEl.style.display = 'none';
            }

            const nextText = getNextBlindsText();
            if (nextLevelEl) {
                nextLevelEl.textContent = nextText !== 'NONE' ? 'NEXT ' + nextText : '';
            }
        }

        function renderLevelDots() {
            const c = document.getElementById('levelDots');
            c.innerHTML = '';
            state.levels.forEach((lvl, i) => {
                const dot = document.createElement('span');
                dot.className = 'timeline-dot';
                if (lvl.isBreak) dot.classList.add('break-dot');
                if (i < state.currentLevelIndex) dot.classList.add('done');
                if (i === state.currentLevelIndex) dot.classList.add('now');
                dot.title = lvl.isBreak ? ('Break ' + lvl.durationMinutes + 'm') : ('L' + (i + 1) + ': ' +
                    formatChips(lvl.smallBlind) + '/' + formatChips(lvl.bigBlind));
                c.appendChild(dot);
            });
        }

        function updateCalculations() {
            const avg = state.playerCount > 0 ? Math.floor(state.totalChips / state.playerCount) : 0;
            const formatted = avg.toLocaleString('en-US');
            const avgDesktop = document.getElementById('avgStack');
            const avgMobile = document.getElementById('avgStackMobile');
            if (avgDesktop) avgDesktop.textContent = formatted;
            if (avgMobile) avgMobile.textContent = formatted;
        }

        function syncInputsToState() {
            const pcDesktop = document.getElementById('playerCount');
            const tcDesktop = document.getElementById('totalChips');
            const pcMobile = document.getElementById('playerCountMobile');
            const tcMobile = document.getElementById('totalChipsMobile');
            if (pcDesktop) pcDesktop.value = state.playerCount;
            if (tcDesktop) tcDesktop.value = state.totalChips;
            if (pcMobile) pcMobile.value = state.playerCount;
            if (tcMobile) tcMobile.value = state.totalChips;
        }

        function renderStats() {
            syncInputsToState();
            updateCalculations();
        }

        function renderAll() {
            updateTimerDisplay();
            updateSeekBar();
            updatePlayButton();
            renderLevelBadge();
            renderBlindCards();
            renderLevelDots();
            renderStats();
        }

        function openSettings() { document.getElementById('settingsOverlay').classList.add('open');
            renderLevelEditor();
            updateLogoPreview(); }

        function closeSettings() { document.getElementById('settingsOverlay').classList.remove('open'); }

        function renderLevelEditor() {
            const container = document.getElementById('levelEditorRows');
            container.innerHTML = '';
            state.levels.forEach((lvl, i) => {
                const row = document.createElement('div');
                row.className = 'level-edit-row';
                row.innerHTML = '<span class="lvl-num">' + (i + 1) + '</span>' +
                    '<input type="number" value="' + lvl.smallBlind +
                    '" data-field="smallBlind" data-index="' + i + '" min="0" step="100" ' + (lvl.isBreak ?
                        'disabled' : '') + '>' +
                    '<input type="number" value="' + lvl.bigBlind + '" data-field="bigBlind" data-index="' + i +
                    '" min="0" step="100" ' + (lvl.isBreak ? 'disabled' : '') + '>' +
                    '<input type="number" value="' + lvl.ante + '" data-field="ante" data-index="' + i +
                    '" min="0" step="100" ' + (lvl.isBreak ? 'disabled' : '') + '>' +
                    '<input type="number" value="' + lvl.durationMinutes +
                    '" data-field="durationMinutes" data-index="' + i + '" min="1" max="120">' +
                    '<span class="brk-tgl ' + (lvl.isBreak ? 'on' : '') + '" data-index="' + i + '">' + (lvl
                        .isBreak ? 'BREAK' : '盲注') + '</span>' +
                    '<button class="row-del" data-action="delete" data-index="' + i + '">✕</button>';
                container.appendChild(row);
            });

            container.onchange = (e) => {
                const idx = parseInt(e.target.dataset.index),
                    field = e.target.dataset.field;
                if (isNaN(idx) || !field) return;
                const val = parseInt(e.target.value) || 0;
                state.levels[idx][field] = field === 'durationMinutes' ? Math.max(1, val) : Math.max(0, val);
                if (field === 'durationMinutes' && idx === state.currentLevelIndex && state.remainingSeconds >
                    state.levels[idx].durationMinutes * 60) {
                    state.remainingSeconds = state.levels[idx].durationMinutes * 60;
                }
            };

            container.onclick = (e) => {
                const idx = parseInt(e.target.dataset.index);
                if (isNaN(idx)) return;
                if (e.target.dataset.action === 'delete') {
                    if (state.levels.length <= 1) { showToast('Must keep at least 1 level'); return; }
                    state.levels.splice(idx, 1);
                    if (state.currentLevelIndex >= state.levels.length) {
                        state.currentLevelIndex = state.levels.length - 1;
                        state.remainingSeconds = state.levels[state.currentLevelIndex].durationMinutes * 60;
                    }
                    renderLevelEditor();
                }
                if (e.target.classList.contains('brk-tgl')) {
                    state.levels[idx].isBreak = !state.levels[idx].isBreak;
                    if (state.levels[idx].isBreak) { state.levels[idx].smallBlind = 0;
                        state.levels[idx].bigBlind = 0;
                        state.levels[idx].ante = 0; }
                    renderLevelEditor();
                }
            };
        }

        function saveSettings() {
            document.querySelectorAll('#levelEditorRows input').forEach(inp => {
                const idx = parseInt(inp.dataset.index),
                    field = inp.dataset.field;
                if (isNaN(idx) || !field) return;
                const val = parseInt(inp.value) || 0;
                state.levels[idx][field] = field === 'durationMinutes' ? Math.max(1, val) : Math.max(0, val);
            });
            if (state.currentLevelIndex >= state.levels.length) {
                state.currentLevelIndex = 0;
                state.remainingSeconds = state.levels[0].durationMinutes * 60;
            } else {
                const maxTime = state.levels[state.currentLevelIndex].durationMinutes * 60;
                if (state.remainingSeconds > maxTime) state.remainingSeconds = maxTime;
            }
            state.isRunning = false;
            clearInterval(timerInterval);
            timerInterval = null;
            saveState();
            renderAll();
            closeSettings();
            showToast('设置已保存');
        }

        function applyPreset(name) {
            const preset = PRESETS[name];
            if (!preset) return;
            state.levels = preset.levels.map(l => ({ smallBlind: l.sb, bigBlind: l.bb, ante: l.ante,
                durationMinutes: l.dur, isBreak: l.brk }));
            state.currentLevelIndex = 0;
            state.remainingSeconds = state.levels[0].durationMinutes * 60;
            state.isRunning = false;
            clearInterval(timerInterval);
            timerInterval = null;
            renderLevelEditor();
            showToast('LOADED: ' + preset.name);
        }

        // --- Custom presets ---
        const CUSTOM_PRESETS_KEY = 'poker_custom_presets';

        function loadCustomPresets() {
            try {
                const raw = localStorage.getItem(CUSTOM_PRESETS_KEY);
                return raw ? JSON.parse(raw) : {};
            } catch (e) { return {}; }
        }

        function saveCustomPresets(presets) {
            try {
                localStorage.setItem(CUSTOM_PRESETS_KEY, JSON.stringify(presets));
            } catch (e) { showToast('⚠ SAVE FAILED'); }
        }

        function renderCustomPresets() {
            const container = document.getElementById('customPresets');
            if (!container) return;
            container.innerHTML = '';
            const presets = loadCustomPresets();
            Object.keys(presets).forEach(name => {
                const wrapper = document.createElement('span');
                wrapper.style.cssText = 'display:inline-flex;align-items:center;gap:2px;';
                const btn = document.createElement('button');
                btn.className = 'btn-preset';
                btn.textContent = name;
                btn.addEventListener('click', () => {
                    state.levels = presets[name].map(l => ({
                        smallBlind: l.sb, bigBlind: l.bb, ante: l.ante,
                        durationMinutes: l.dur, isBreak: l.brk
                    }));
                    state.currentLevelIndex = 0;
                    state.remainingSeconds = state.levels[0].durationMinutes * 60;
                    state.isRunning = false;
                    clearInterval(timerInterval);
                    timerInterval = null;
                    renderLevelEditor();
                    showToast('LOADED: ' + name);
                });
                const delBtn = document.createElement('button');
                delBtn.textContent = '×';
                delBtn.style.cssText = 'background:transparent;border:none;color:#ff5555;cursor:pointer;font-size:1.1rem;padding:0 4px;line-height:1;';
                delBtn.title = 'Delete ' + name;
                delBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    if (confirm('Delete preset "' + name + '"?')) {
                        delete presets[name];
                        saveCustomPresets(presets);
                        renderCustomPresets();
                        showToast('DELETED: ' + name);
                    }
                });
                wrapper.appendChild(btn);
                wrapper.appendChild(delBtn);
                container.appendChild(wrapper);
            });
        }

        function saveCurrentAsPreset() {
            const name = prompt('请输入新规则名称：');
            if (!name || !name.trim()) return;
            const trimmedName = name.trim();
            const presets = loadCustomPresets();
            if (presets[trimmedName] && !confirm('规则 "' + trimmedName + '" 已存在，是否覆盖？')) return;
            presets[trimmedName] = state.levels.map(l => ({
                sb: l.smallBlind, bb: l.bigBlind, ante: l.ante, dur: l.durationMinutes, brk: l.isBreak
            }));
            saveCustomPresets(presets);
            renderCustomPresets();
            showToast('SAVED: ' + trimmedName);
        }

        // Wire up custom preset UI
        document.getElementById('btnSaveAsPreset').addEventListener('click', saveCurrentAsPreset);
        // Load custom presets on init
        renderCustomPresets();

        function handlePlayerCountChange(val) {
            state.playerCount = Math.max(2, parseInt(val) || 2);
            saveState();
            syncInputsToState();
            updateCalculations();
        }

        function handleTotalChipsChange(val) {
            state.totalChips = Math.max(0, parseInt(val) || 0);
            saveState();
            syncInputsToState();
            updateCalculations();
        }

        function setupLayoutResponsiveness() {
            const sideLeftDesktop = document.getElementById('sideLeftDesktop');
            const sideRightDesktop = document.getElementById('sideRightDesktop');
            const sideRowMobile = document.getElementById('sideRowMobile');
            const mainEl = document.querySelector('.main');

            function applyLayout() {
                const width = window.innerWidth;
                if (width <= 900) {
                    if (sideLeftDesktop) sideLeftDesktop.style.display = 'none';
                    if (sideRightDesktop) sideRightDesktop.style.display = 'none';
                    if (sideRowMobile) sideRowMobile.style.display = 'flex';
                    if (mainEl) {
                        mainEl.style.gridTemplateColumns = '1fr';
                        mainEl.style.gridTemplateAreas = '"center" "side-row"';
                    }
                } else {
                    if (sideLeftDesktop) sideLeftDesktop.style.display = 'flex';
                    if (sideRightDesktop) sideRightDesktop.style.display = 'flex';
                    if (sideRowMobile) sideRowMobile.style.display = 'none';
                    if (mainEl) {
                        mainEl.style.gridTemplateColumns = 'var(--side-col-width) 1fr var(--side-col-width)';
                        mainEl.style.gridTemplateAreas = '"left center right"';
                    }
                }
            }

            applyLayout();
            window.addEventListener('resize', applyLayout);
            return applyLayout;
        }

        const layoutApply = setupLayoutResponsiveness();

        document.getElementById('btnPlay').addEventListener('click', toggleTimer);
        document.getElementById('btnNext').addEventListener('click', skipToNextLevel);
        document.getElementById('btnPrev').addEventListener('click', goToPrevLevel);
        document.getElementById('btnSound').addEventListener('click', toggleSound);
        document.getElementById('btnSettings').addEventListener('click', openSettings);
        document.getElementById('btnCloseSettings').addEventListener('click', closeSettings);
        document.getElementById('btnFullscreen').addEventListener('click', toggleFullscreen);
        document.getElementById('btnSaveSettings').addEventListener('click', saveSettings);
        document.getElementById('settingsOverlay').addEventListener('click', (e) => { if (e.target === e
                .currentTarget) closeSettings(); });

        document.getElementById('btnAddLevel').addEventListener('click', () => {
            const last = state.levels[state.levels.length - 1];
            state.levels.push({
                smallBlind: last ? last.bigBlind * 2 : 1000,
                bigBlind: last ? last.bigBlind * 4 : 2000,
                ante: last ? last.bigBlind * 2 : 1000,
                durationMinutes: last ? last.durationMinutes : 15,
                isBreak: false
            });
            renderLevelEditor();
        });

        document.getElementById('btnResetAll').addEventListener('click', () => {
            if (confirm('Reset to defaults?')) {
                localStorage.removeItem('poker_blind_timer_state_v4');
                state = JSON.parse(JSON.stringify(DEFAULT_STATE));
                state.isRunning = false;
                clearInterval(timerInterval);
                timerInterval = null;
                renderAll();
                closeSettings();
                showToast('RESET COMPLETE');
            }
        });

        document.querySelectorAll('[data-preset]').forEach(btn => { btn.addEventListener('click', () => applyPreset(btn
                .dataset.preset)); });

        // Image upload
        const imgFileInput = document.getElementById('imgFileInput');
        const btnUploadImg = document.getElementById('btnUploadImg');
        const btnClearImg = document.getElementById('btnClearImg');
        if (btnUploadImg && imgFileInput) {
            btnUploadImg.addEventListener('click', () => imgFileInput.click());
            imgFileInput.addEventListener('change', function() {
                const file = this.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = function(e) {
                    localStorage.setItem('poker_logo_image', e.target.result);
                    loadLogoImage();
                    updateLogoPreview();
                    showToast('LOGO UPDATED');
                };
                reader.readAsDataURL(file);
            });
        }
        if (btnClearImg) {
            btnClearImg.addEventListener('click', () => {
                localStorage.removeItem('poker_logo_image');
                loadLogoImage();
                updateLogoPreview();
                if (imgFileInput) imgFileInput.value = '';
                showToast('LOGO REMOVED');
            });
        }

        const playerCountDesktop = document.getElementById('playerCount');
        const totalChipsDesktop = document.getElementById('totalChips');
        const playerCountMobile = document.getElementById('playerCountMobile');
        const totalChipsMobile = document.getElementById('totalChipsMobile');

        if (playerCountDesktop) {
            playerCountDesktop.addEventListener('change', function() { handlePlayerCountChange(this.value); });
            playerCountDesktop.addEventListener('input', function() { handlePlayerCountChange(this.value); });
        }
        if (totalChipsDesktop) {
            totalChipsDesktop.addEventListener('change', function() { handleTotalChipsChange(this.value); });
            totalChipsDesktop.addEventListener('input', function() { handleTotalChipsChange(this.value); });
        }
        if (playerCountMobile) {
            playerCountMobile.addEventListener('change', function() { handlePlayerCountChange(this.value); });
            playerCountMobile.addEventListener('input', function() { handlePlayerCountChange(this.value); });
        }
        if (totalChipsMobile) {
            totalChipsMobile.addEventListener('change', function() { handleTotalChipsChange(this.value); });
            totalChipsMobile.addEventListener('input', function() { handleTotalChipsChange(this.value); });
        }

        document.getElementById('seekSlider').addEventListener('input', function() {
            const lvl = state.levels[state.currentLevelIndex];
            if (!lvl || state.currentLevelIndex >= state.levels.length) return;
            const total = lvl.durationMinutes * 60;
            const elapsed = parseInt(this.value) || 0;
            state.remainingSeconds = Math.max(0, total - elapsed);
            updateTimerDisplay();
        });

        document.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
            switch (e.key) {
                case ' ':
                    e.preventDefault();
                    toggleTimer();
                    break;
                case 'ArrowRight':
                    e.preventDefault();
                    skipToNextLevel();
                    break;
                case 'ArrowLeft':
                    e.preventDefault();
                    goToPrevLevel();
                    break;
                case 'f':
                case 'F':
                    if (!e.ctrlKey && !e.metaKey) { e.preventDefault();
                        toggleFullscreen(); }
                    break;
                case 'Escape':
                    if (document.getElementById('settingsOverlay').classList.contains('open')) closeSettings();
                    break;
            }
        });

        function toggleFullscreen() {
            if (!document.fullscreenElement && !document.webkitFullscreenElement) {
                const el = document.documentElement;
                if (el.requestFullscreen) el.requestFullscreen();
                else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
            } else {
                if (document.exitFullscreen) document.exitFullscreen();
                else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
            }
        }

        async function requestWakeLock() {
            if (!('wakeLock' in navigator)) return;
            try {
                wakeLock = await navigator.wakeLock.request('screen');
                wakeLock.addEventListener('release', () => { wakeLock = null; });
            } catch (e) {}
        }

        async function releaseWakeLock() {
            if (wakeLock) { try { await wakeLock.release(); } catch (e) {} wakeLock = null; }
        }

        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible' && state.isRunning) { requestWakeLock(); }
        });

        function toggleSound() {
            soundEnabled = !soundEnabled;
            const btn = document.getElementById('btnSound');
            btn.textContent = soundEnabled ? '🔊' : '🔇';
            btn.style.opacity = soundEnabled ? '1' : '0.5';
            if (soundEnabled) playBeep(880, 0.1, 'sine', 0.05);
        }

        function init() {
            loadState();
            loadLogoImage();
            layoutApply();
            syncInputsToState();
            renderAll();
            state.isRunning = false;
            clearInterval(timerInterval);
            timerInterval = null;
            updatePlayButton();
        }

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => { navigator.serviceWorker.register('sw.js').catch(() => {}); });
        }

        init();
    </script>
</body>
</html>
